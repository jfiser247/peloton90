<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="P90 Peloton">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080810">
<meta name="description" content="90-Day Peloton Fat Loss Program Tracker">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" id="appleTouchIcon">
<link rel="apple-touch-startup-image" id="splashIcon">
<title>Peloton 90 · Fat Loss Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #10101e;
  --card: #131320;
  --card2: #16162a;
  --border: rgba(255,255,255,0.07);
  --white: #f0eee8;
  --muted: rgba(240,238,232,0.38);
  --red: #e8322a;
  --orange: #f07830;
  --teal: #1eb89a;
  --gold: #d4a832;
  --purple: #8866ee;
  --green: #3dbb77;
  --blue: #3a8ef0;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
/* Font-size scale — generated from Typography.swift */
  --fs-display: 72px;
  --fs-title: 28px;
  --fs-headline: 24px;
  --fs-callout: 20px;
  --fs-body: 19px;
  --fs-subhead: 18px;
  --fs-caption: 17px;
  --fs-micro: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size: 16px; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--white); font-family:'Barlow',sans-serif; -webkit-font-smoothing:antialiased; }

#app { display:flex; flex-direction:column; height:100dvh; }

/* HEADER */
.app-header {
  padding: calc(var(--safe-top) + 10px) 18px 12px;
  background: linear-gradient(180deg,#0d0d1c 0%,transparent 100%);
  flex-shrink:0; z-index:20; position:relative;
}
.header-row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.app-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; letter-spacing:.06em; text-transform:uppercase; }
.app-title span { color:var(--red); }
.header-badges { display:flex; gap:6px; align-items:center; }
.badge { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:.04em; padding:4px 10px; border-radius:12px; }
.badge-day { background:var(--red); color:#fff; }
.badge-fast { background:rgba(30,184,154,.2); color:var(--teal); border:1px solid rgba(30,184,154,.3); }
.header-row2 { display:flex; align-items:center; justify-content:space-between; }
.phase-strip { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
.fast-window { font-size:15px; color:var(--teal); font-family:'Barlow Semi Condensed',sans-serif; font-weight:600; }

/* FAST TYPE CHIPS in schedule */
.chip-fast17  { background:rgba(30,184,154,.15); color:var(--teal); }
.chip-fast24  { background:rgba(136,102,238,.2); color:var(--purple); }
.chip-fast20  { background:rgba(212,168,50,.15); color:var(--gold); }

/* EXTENDED FAST BANNER — purple tint for 24hr Sundays */
.fast-banner.extended {
  background:linear-gradient(135deg,rgba(136,102,238,.15),rgba(136,102,238,.05));
  border-color:rgba(136,102,238,.35);
}
.fast-banner.extended .fast-title { color:var(--purple); }

/* FAST 20hr BANNER — gold tint for Thursday P3 */
.fast-banner.deep {
  background:linear-gradient(135deg,rgba(212,168,50,.12),rgba(212,168,50,.04));
  border-color:rgba(212,168,50,.3);
}
.fast-banner.deep .fast-title { color:var(--gold); }

/* FAST TIER LEGEND */
.fast-tier-legend { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
.fast-tier-row { display:flex; align-items:flex-start; gap:10px; padding:9px 12px; border-radius:8px; }
.fast-tier-row.tier-daily  { background:rgba(30,184,154,.08); border:1px solid rgba(30,184,154,.18); }
.fast-tier-row.tier-weekly { background:rgba(136,102,238,.08); border:1px solid rgba(136,102,238,.2); }
.fast-tier-row.tier-deep   { background:rgba(212,168,50,.08); border:1px solid rgba(212,168,50,.2); }
.fast-tier-badge { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:4px 10px; border-radius:4px; white-space:nowrap; flex-shrink:0; margin-top:1px; }
.fast-tier-badge.daily  { background:rgba(30,184,154,.25); color:var(--teal); }
.fast-tier-badge.weekly { background:rgba(136,102,238,.25); color:var(--purple); }
.fast-tier-badge.deep   { background:rgba(212,168,50,.25); color:var(--gold); }
.fast-tier-info { flex:1; }
.fast-tier-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:.05em; margin-bottom:2px; }
.fast-tier-desc  { font-size:16px; color:rgba(240,238,232,.6); line-height:1.4; }

/* NAV */
.nav-tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:15; }
.nav-tab { flex:1; padding:9px 4px; text-align:center; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; transition:color .2s,border-color .2s; }
.nav-tab.active { color:var(--red); border-bottom-color:var(--red); }
.nav-tab-icon { font-size:17px; display:block; margin-bottom:1px; }

.scroll-view { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
.scroll-view::-webkit-scrollbar { display:none; }
.screen { display:none; }
.screen.active { display:block; }

/* ── TODAY ── */
.today-screen { padding-bottom:calc(var(--safe-bot) + 20px); }

.day-nav { display:flex; align-items:center; padding:10px 16px; gap:10px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:10; }
.day-nav-btn { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--white); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.day-nav-btn:active { background:var(--card); }
.day-nav-center { flex:1; text-align:center; }
.day-nav-label { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:19px; letter-spacing:.04em; }
.day-nav-date { font-size:13px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }

/* FASTING BANNER */
.fast-banner {
  margin:12px 14px 0;
  background:linear-gradient(135deg,rgba(30,184,154,.12),rgba(30,184,154,.05));
  border:1px solid rgba(30,184,154,.25);
  border-radius:12px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:12px;
}
.fast-icon { font-size:24px; flex-shrink:0; }
.fast-info { flex:1; }
.fast-title { font-family:'Barlow Condensed',sans-serif; font-size:var(--fs-callout); font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--teal); margin-bottom:2px; }
.fast-detail { font-size:var(--fs-body); color:rgba(240,238,232,.6); line-height:1.3; }
.fast-timer-wrap { text-align:right; flex-shrink:0; }
.fast-status { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
.fast-status.fasting { color:var(--teal); }
.fast-status.eating { color:var(--gold); }

/* DAY HERO */
.day-hero { padding:14px 14px 0; display:flex; align-items:flex-end; gap:12px; margin-bottom:12px; }
.day-num-big { font-family:'Barlow Condensed',sans-serif; font-size:72px; font-weight:900; line-height:1; color:var(--red); opacity:.12; flex-shrink:0; }
.day-phase-info { flex:1; padding-bottom:6px; }
.day-phase-name { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-bottom:3px; }
.day-prog-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:5px; }
.day-prog-fill { height:100%; background:linear-gradient(90deg,var(--red),var(--orange)); border-radius:2px; transition:width .4s; }
.day-prog-lbl { font-size:15px; color:var(--muted); letter-spacing:0; }

/* SECTION DIVIDER */
.workout-section-head {
  padding:4px 14px 6px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:8px;
}
.workout-section-head::after { content:''; flex:1; height:1px; background:var(--border); }

/* WORKOUT CARDS */
.workouts-list { padding:0 14px; display:flex; flex-direction:column; gap:8px; }
.workout-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:11px 12px;
  display:flex;
  align-items:flex-start;
  gap:10px;
  cursor:pointer;
  transition:border-color .2s,background .2s;
  position:relative;
  overflow:hidden;
}
.workout-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--card-accent,var(--red)); border-radius:3px 0 0 3px; }
.workout-card.done { border-color:rgba(61,187,119,.25); background:rgba(61,187,119,.05); }
.workout-card.done::before { background:var(--green); }
.workout-check { width:26px; height:26px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:15px; transition:all .2s; background:var(--surface); margin-top:1px; }
.workout-card.done .workout-check { background:var(--green); border-color:var(--green); color:#fff; }
.workout-info { flex:1; min-width:0; }
.workout-type { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; margin-bottom:2px; }
.workout-name { font-family:'Barlow Semi Condensed',sans-serif; font-size:var(--fs-headline); font-weight:600; line-height:1.2; margin-bottom:3px; }
.workout-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.workout-dur { font-size:15px; color:var(--muted); background:var(--surface); padding:3px 9px; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-weight:600; }
.workout-instructor { font-size:16px; color:var(--muted); }
.workout-note { font-size:16px; color:var(--orange); margin-top:3px; font-family:'Barlow Semi Condensed',sans-serif; font-weight:500; font-style:italic; }

/* PELOTON LINK BUTTON */
.peloton-link {
  display:inline-flex; align-items:center; gap:5px;
  margin-top:6px;
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;
  padding:4px 10px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px; font-weight:700; letter-spacing:.04em;
  color:rgba(240,238,232,0.6);
  cursor:pointer;
  transition: border-color .15s, color .15s;
}
.peloton-link:active { border-color:rgba(255,255,255,.25); color:var(--white); }

/* CLASS DETAIL MODAL */
.class-modal-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.75); backdrop-filter:blur(4px);
  align-items:flex-end; justify-content:center;
}
.class-modal-overlay.open { display:flex; }
.class-modal {
  background:var(--surface); border-radius:16px 16px 0 0;
  width:100%; max-width:560px; overflow:hidden;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.class-modal-thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--bg); }
.class-modal-thumb-placeholder { width:100%; aspect-ratio:16/9; background:linear-gradient(135deg,#1a1a2e,#16213e); display:flex; align-items:center; justify-content:center; font-size:48px; }
.class-modal-body { padding:18px 20px 32px; }
.class-modal-type { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.class-modal-name { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:700; color:var(--white); line-height:1.2; margin-bottom:6px; }
.class-modal-instructor { font-size:15px; color:var(--muted); margin-bottom:14px; }
.class-modal-stats { display:flex; gap:20px; margin-bottom:20px; }
.class-modal-stat { display:flex; flex-direction:column; gap:2px; }
.class-modal-stat-val { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; color:var(--white); }
.class-modal-stat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.class-modal-btn {
  display:block; width:100%; padding:14px;
  background:var(--red); border:none; border-radius:10px;
  font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; letter-spacing:.05em;
  color:var(--white); text-align:center; text-decoration:none;
  cursor:pointer;
}
.class-modal-close {
  display:block; width:100%; padding:12px; margin-top:10px;
  background:none; border:none;
  font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:600;
  color:var(--muted); cursor:pointer;
}

/* pullup badge */
.pullup-badge { display:inline-block; font-size:13px; background:rgba(58,142,240,.15); color:var(--blue); border-radius:4px; padding:3px 8px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.04em; margin-top:3px; }

.type-ride { --card-accent:var(--teal); color:var(--teal); }
.type-hiit { --card-accent:#ff4466; color:#ff4466; }
.type-strength { --card-accent:var(--red); color:var(--red); }
.type-yoga { --card-accent:var(--gold); color:var(--gold); }
.type-stretch { --card-accent:var(--purple); color:var(--purple); }
.type-core { --card-accent:var(--orange); color:var(--orange); }
.type-bootcamp { --card-accent:#cc60ee; color:#cc60ee; }
.type-pullups { --card-accent:var(--blue); color:var(--blue); }

.complete-btn { margin:12px 14px 0; padding:14px; background:var(--red); border:none; border-radius:12px; color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; width:calc(100% - 28px); cursor:pointer; transition:opacity .2s,transform .1s; }
.complete-btn:active { transform:scale(.98); }
.complete-btn.all-done { background:var(--green); }

.day-notes { margin:10px 14px 0; background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.day-notes-header { padding:10px 14px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); }
.day-notes textarea { width:100%; background:transparent; border:none; outline:none; color:var(--white); font-family:'Barlow',sans-serif; font-size:15px; line-height:1.5; padding:10px 14px; resize:none; min-height:70px; font-weight:300; }
.day-notes textarea::placeholder { color:var(--muted); }

.drink-row { margin:10px 14px 0; }
.drink-toggle { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; cursor:pointer; user-select:none; transition:border-color .2s,background .2s; }
.drink-toggle.drink-on { border-color:rgba(228,100,80,.4); background:rgba(228,100,80,.07); }
.drink-toggle-label { flex:1; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); }
.drink-toggle.drink-on .drink-toggle-label { color:var(--red); }
.drink-badge { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:.08em; padding:3px 9px; border-radius:6px; background:var(--surface); color:var(--muted); }
.drink-toggle.drink-on .drink-badge { background:rgba(228,100,80,.18); color:var(--red); }

.rest-day-card { margin:16px 14px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:36px 18px; text-align:center; }
.rest-day-card .rest-icon { font-size:42px; margin-bottom:10px; }
.rest-day-card h2 { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
.rest-day-card p { font-size:15px; color:var(--muted); line-height:1.6; }
.rest-fast-note { margin-top:12px; padding:10px 14px; background:rgba(30,184,154,.1); border-radius:8px; font-size:15px; color:var(--teal); font-family:'Barlow Semi Condensed',sans-serif; }

/* ── SCHEDULE ── */
.schedule-screen { padding-bottom:calc(var(--safe-bot) + 20px); }
.phase-head { padding:14px 14px 8px; position:sticky; top:0; z-index:5; background:var(--bg); }
.phase-head-inner { background:var(--surface); border-radius:10px; padding:9px 12px; display:flex; align-items:center; gap:8px; border:1px solid var(--border); }
.phase-head-tag { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:4px 9px; border-radius:4px; background:var(--tag-color,var(--red)); color:#fff; }
.phase-head-title { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; letter-spacing:.05em; }
.phase-head-prog { margin-left:auto; font-size:16px; color:var(--muted); font-family:'Barlow Semi Condensed',sans-serif; }
.week-section { margin:0 14px 6px; }
.week-label-s { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); padding:6px 4px 5px; }
.sched-day-row { display:flex; align-items:center; gap:10px; padding:9px 11px; background:var(--card); border-radius:9px; margin-bottom:5px; cursor:pointer; border:1px solid var(--border); transition:border-color .15s; }
.sched-day-row:active { border-color:rgba(255,255,255,.15); }
.sched-day-row.today { border-color:var(--red); }
.sched-day-row.completed-row { border-color:rgba(61,187,119,.2); }
.sched-day-row.rest-row { opacity:.4; }
.sched-day-row.fast-extended { opacity:1 !important; border-color:rgba(136,102,238,.35); background:rgba(136,102,238,.06); }
.sched-day-row.fast-deep { border-color:rgba(212,168,50,.3); background:rgba(212,168,50,.05); }
.sched-day-num { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; width:36px; text-align:center; flex-shrink:0; color:var(--muted); }
.sched-day-row.today .sched-day-num { color:var(--red); }
.sched-day-row.completed-row .sched-day-num { color:var(--green); }
.sched-day-row.fast-extended .sched-day-num { color:var(--purple); opacity:1; }
.sched-day-info { flex:1; min-width:0; }
.sched-day-name { font-size:17px; font-weight:600; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:'Barlow Semi Condensed',sans-serif; }
.sched-day-types { display:flex; gap:3px; flex-wrap:wrap; align-items:center; }
.type-chip { font-size:15px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.02em; text-transform:uppercase; padding:3px 7px; border-radius:3px; }
.chip-ride { background:rgba(30,184,154,.15); color:var(--teal); }
.chip-hiit { background:rgba(255,68,102,.15); color:#ff4466; }
.chip-strength { background:rgba(232,50,42,.15); color:#f07070; }
.chip-yoga { background:rgba(212,168,50,.15); color:var(--gold); }
.chip-stretch { background:rgba(136,102,238,.15); color:var(--purple); }
.chip-core { background:rgba(240,120,48,.15); color:var(--orange); }
.chip-bootcamp { background:rgba(200,90,240,.15); color:#cc80ee; }
.chip-pullups { background:rgba(58,142,240,.15); color:var(--blue); }
.chip-rest { background:rgba(255,255,255,.05); color:var(--muted); }
/* Fast type chips — more prominent */
.chip-fast17  { background:rgba(30,184,154,.12); color:var(--teal); border:1px solid rgba(30,184,154,.25); }
.chip-fast24  { background:rgba(136,102,238,.2); color:var(--purple); border:1px solid rgba(136,102,238,.4); font-size:14px; padding:3px 8px; }
.chip-fast20  { background:rgba(212,168,50,.18); color:var(--gold); border:1px solid rgba(212,168,50,.35); font-size:14px; padding:3px 8px; }
.sched-day-status { font-size:17px; flex-shrink:0; }

/* MEASUREMENT DAY ROW */
.measure-day-row {
  display:flex; align-items:center; gap:10px;
  padding:8px 11px;
  background:rgba(212,168,50,.07);
  border:1px solid rgba(212,168,50,.22);
  border-radius:9px; margin-bottom:5px;
  cursor:pointer;
}
.measure-day-row:active { border-color:rgba(212,168,50,.4); }
.measure-day-icon { font-size:18px; flex-shrink:0; }
.measure-day-text { flex:1; }

function buildWeekOptions(currentWk, defaultWk) {
  return Array.from({length: currentWk + 1}, (_, w) => {
    const logged = state.measurements.some(m => m.week === w);
    const lbl = w === 0 ? `Baseline${logged ? ' ✓' : ''}` : `Week ${w}${logged ? ' ✓' : ''}`;
    return `<option value="${w}"${w === defaultWk ? ' selected' : ''}>${lbl}</option>`;
  }).join('');
}
function calcDefaultFormWeek(currentWk) {
  for(let w = 0; w <= currentWk; w++) {
    if(!state.measurements.some(m => m.week === w)) return w;
  }
  return currentWk;
}

const START_DATE = new Date(2026, 2, 30);

let state = { viewingDay:1, completed:{}, dayNotes:{}, measurements:[], drinkDays:{} };

function getTodayDay() {
  const t = new Date(); t.setHours(0,0,0,0);
  const s = new Date(START_DATE); s.setHours(0,0,0,0);
  return Math.max(1, Math.min(90, Math.floor((t-s)/86400000)+1));
}

function loadState() {
  try { const s = localStorage.getItem('pelo90v2'); if(s) state = {...state,...JSON.parse(s)}; } catch(e){}
  state.viewingDay = getTodayDay();
}

function saveState() {
  try { localStorage.setItem('pelo90v2', JSON.stringify(state)); } catch(e){}
}

function isWorkoutDone(day, i) { return !!state.completed[`${day}-${i}`]; }
function isDayFullyDone(day) {
  const w = SCHEDULE[day]; if(!w) return false;
  return w.every((_,i) => isWorkoutDone(day,i));
}
function getCompletedCount() {
  let n=0; for(let d=1;d<=90;d++) if(isDayFullyDone(d)) n++; return n;
}

function getPhaseInfo(day) {
  if(day<=21) return {name:'Phase 1 · Foundation',color:'#1eb89a',tag:'PHASE 1'};
  if(day<=28) return {name:'Transition · Recovery',color:'#d4a832',tag:'RECOVERY'};
  if(day<=49) return {name:'Phase 2 · Strength',color:'#f07830',tag:'PHASE 2'};
  if(day<=56) return {name:'Transition · Recovery',color:'#d4a832',tag:'RECOVERY'};
  if(day<=84) return {name:'Phase 3 · Peak',color:'#e8322a',tag:'PHASE 3'};
  return {name:'Victory Week',color:'#e8322a',tag:'⚡ VICTORY'};
}

// ── FASTING SYSTEM ──────────────────────────────
// Three tiers based on research:
//   Tier 1 — 17:7 daily  (every day, eat 10am-5pm)
//   Tier 2 — 24hr weekly (every Sunday: last meal Sat 5pm → Sun 5pm)
//   Tier 3 — 20hr deep   (Phase 3 Thursdays only: eat 3pm-5pm only)
// Sunday = day % 7 === 0  (days 7,14,21,...,84)
// Thursday P3 = day 60,67,74,81,88 (Phase 3 yoga days)
const DEEP_FAST_DAYS = new Set([60,67,74,81,88]);

function getFastType(day) {
  if(!day) day = getTodayDay();
  if(day % 7 === 0) return 'extended'; // Sunday 24hr
  if(DEEP_FAST_DAYS.has(day)) return 'deep';   // P3 Thursday 20hr
  return 'daily';
}

function getFastingStatus() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const mins = h*60+m;
  const dayOfWeek = now.getDay(); // 0=Sun
  const todayDay = getTodayDay();
  const fastType = getFastType(todayDay);

  // ── SUNDAY 24hr fast ──
  // Last meal Sat 5pm (yesterday 17:00), break fast Sun 5pm (today 17:00)
  if(fastType === 'extended') {
    if(mins >= 1020) { // after 5pm — fast technically over, eating window open
      return {type:'extended', status:'24HR FAST COMPLETE',class:'eating',
        msg:'Well done. Break your fast now with water + small protein meal first.',icon:'💜'};
    }
    const rem = 1020 - mins;
    const rh = Math.floor(rem/60), rm = rem%60;
    return {type:'extended', status:`24HR FAST · ${rh}h ${rm}m left`,class:'fasting',
      msg:'Full Sunday fast. Water + electrolytes only. Break fast at 5pm today.',icon:'💜'};
  }

  // ── P3 THURSDAY 20hr deep fast ──
  // Eating window compressed to 3pm–5pm (2hrs) only
  if(fastType === 'deep') {
    if(mins >= 900 && mins < 1020) { // 3pm-5pm eating window
      return {type:'deep', status:'DEEP FAST WINDOW · 3–5PM',class:'eating',
        msg:'2hr compressed window. High protein — 50g+ in this meal.',icon:'🟡'};
    }
    if(mins >= 1020) {
      return {type:'deep', status:'DEEP FAST · BED SOON',class:'fasting',
        msg:'Window closed. Fast continues overnight into tomorrow.',icon:'🟡'};
    }
    const rem = 900 - mins;
    const rh = Math.floor(rem/60), rm = rem%60;
    return {type:'deep', status:`20HR DEEP FAST · ${rh}h ${rm}m left`,class:'fasting',
      msg:'Phase 3 deep fast. Train at 7:30am. Eat only 3–5pm today.',icon:'🟡'};
  }

  // ── STANDARD 17:7 ──
  if(mins >= 600 && mins < 1020) {
    return {type:'daily', status:'EATING WINDOW',class:'eating',
      msg:'10:00 AM – 5:00 PM · Break fast with 40g+ protein now',icon:'🍽'};
  }
  if(mins >= 1020 && mins < 1200) {
    return {type:'daily', status:'WINDOW CLOSING',class:'eating',
      msg:'Eating window closes at 5pm · Finish your last meal soon',icon:'🍽'};
  }
  if(mins >= 1200) {
    return {type:'daily', status:'FASTING · BED BY 8PM',class:'fasting',
      msg:'Fast started. Stop all food and drink. Sleep = fasted hours.',icon:'⏱'};
  }
  const rem = 600 - mins;
  const rh = Math.floor(rem/60), rm = rem%60;
  return {type:'daily', status:`FASTING · ${rh}h ${rm}m left`,class:'fasting',
    msg:'Train at 7:30am (~14.5hrs in). Break fast at 10am.',icon:'⏱'};
}

    fast.class==='eating' ? '🍽 EATING' :
    todayFastType==='extended' ? '💜 24HR' :

  const fastColors = {daily:'var(--teal)', extended:'var(--purple)', deep:'var(--gold)'};
  const fastBannerClass = viewFastType !== 'daily' ? viewFastType : '';
  const isViewingToday = day === todayDay;

  // Static descriptions for non-today days — avoids mixing live status with wrong fast type
  const staticFastDesc = {
    daily:    {icon:'⏱', status:'17:7 Daily Fast', msg:'Eating window 10am–5pm. Train fasted at 7:30am. Break fast with 40g+ protein at 10am.'},
    extended: {icon:'💜', status:'24HR Extended Fast', msg:'Full 24hr fast. Last meal Sat 5pm. Break fast at 5pm tonight. Water + electrolytes only.'},
    deep:     {icon:'🟡', status:'20HR Deep Fast', msg:'Compressed 2hr window: eat only 3–5pm. 50g+ protein in that window.'},
  };
  const bannerStatus = isViewingToday ? fast.status : staticFastDesc[viewFastType].status;
  const bannerMsg    = isViewingToday ? fast.msg    : staticFastDesc[viewFastType].msg;
  const bannerIcon   = isViewingToday ? (fast.icon||'⏱') : staticFastDesc[viewFastType].icon;

  let html = `
  <div class="fast-banner ${fastBannerClass}">
    <div class="fast-icon">${bannerIcon}</div>
    <div class="fast-info">
      <div class="fast-title" style="color:${fastColors[viewFastType]}">${fastLabels[viewFastType]} · ${bannerStatus}</div>
      <div class="fast-detail">${bannerMsg}</div>
    </div>
  </div>
  <div class="day-hero">
    <div class="day-num-big">${day}</div>
    <div class="day-phase-info">
      <div class="day-phase-name" style="color:${phase.color}">${phase.tag}</div>
      <div class="day-prog-bar"><div class="day-prog-fill" style="width:${pct}%"></div></div>
      <div class="day-prog-lbl">${completed} of 90 days done · ${pct}%</div>
    </div>
  </div>`;

  if(!workouts) {
    const isSunday24 = viewFastType === 'extended';
    html += `
    <div class="rest-day-card">
      <div class="rest-icon">${isSunday24 ? '💜' : '😴'}</div>
      <h2>${isSunday24 ? '24hr Fast Day' : 'Rest Day'}</h2>
      <p>${isSunday24
        ? 'Full 24hr fast today. Last meal was Saturday 5pm. Break fast at 5pm tonight. No training — muscles recover while fat burns.'
        : 'No training today. Muscles repair and grow. Focus on sleep, hydration, and quality nutrition in your eating window.'}</p>
      <div class="rest-fast-note" style="${isSunday24 ? 'background:rgba(136,102,238,.12);color:var(--purple);border:1px solid rgba(136,102,238,.2)' : ''}">
        ${isSunday24
          ? '💜 24hr fast · Water + black coffee + electrolytes only · Break fast at 5pm with protein + vegetables'
          : '⏱ 17:7 continues today. Eating window: 10am – 5pm. Stop eating by 5pm. Bed by 8pm.'}
      </div>
    </div>`;

    // ── WEEKLY MEASUREMENT CARD (every Sunday) ────────────────────────────────
    if(isSunday24) {
      const wk = Math.floor(day / 7);
      const hasMeasure = state.measurements.some(m => m.week === wk);
      const isPhaseEnd = [3,6,9,12].includes(wk); // end of each 3-week phase block
      const label = isPhaseEnd ? `Week ${wk} Measurements · Phase Check-In` : `Week ${wk} Measurements`;
      const sublabel = isPhaseEnd
        ? 'Weight · Body Fat % · Muscle Mass · Body Water % · Progress photos'
        : 'Weight · Body Fat % · Muscle Mass · Body Water %';
      html += `
      <div class="measure-day-row" onclick="switchTab('progress')" style="margin:0 14px 10px;border-radius:12px;">
        <div class="measure-day-icon">📏</div>
        <div class="measure-day-text">
          <div class="measure-day-title">${label}</div>
          <div class="measure-day-sub">${sublabel} · Tap to log in Progress tab</div>
        </div>
        <div class="measure-day-done">${hasMeasure ? '✅' : '📲'}</div>
      </div>`;
    }
  } else {
    // Group by "order": fasted cardio first, then strength/pullups, then stretch
    const hiitRides = workouts.filter(w => w.type==='hiit'||w.type==='ride'||w.type==='bootcamp');
    const strengthWork = workouts.filter(w => w.type==='strength'||w.type==='pullups'||w.type==='core'||w.type==='yoga');
    const recoveryWork = workouts.filter(w => w.type==='stretch');
    const allDone = workouts.every((_,i) => isWorkoutDone(day,i));

    const renderSection = (label, items, startIdx) => {
      if(!items.length) return '';
      let s = `<div class="workout-section-head">${label}</div><div class="workouts-list">`;

        s += `
        <div class="workout-card type-${wk.type} ${done?'done':''}" style="animation-delay:${absIdx*0.05}s">

              <span class="workout-dur">${wk.mins} min</span>
              <span class="workout-instructor">${wk.instructor}</span>
            </div>

            ${wk.pullupNote ? `<div class="pullup-badge">💪 ${wk.pullupNote}</div>` : ''}
          </div>
          ${wk.type!=='pullups'?`<button class="peloton-link" onclick="openClassModal(${day},${absIdx})">▶ Open in Peloton</button>`:''}
        </div>`;
      });
      s += `</div>`;
      return s;
    };

    if(hiitRides.length) html += renderSection('① FASTED CARDIO — 7:30am · ~14.5hrs into fast', hiitRides, 0);
    if(strengthWork.length) html += renderSection('② STRENGTH + PULL-UPS — by 9am · Break fast with protein at 10am', strengthWork, hiitRides.length);
    if(recoveryWork.length) html += renderSection('③ STRETCH — Non-negotiable', recoveryWork, hiitRides.length+strengthWork.length);

    </button>`;

      <div class="day-notes-header">📝 Day Notes · Weights / Energy / PRs</div>

    </div>`;
  }

  const hadDrink = !!state.drinkDays[day];
  html += `
  <div class="drink-row">
    <div class="drink-toggle${hadDrink?' drink-on':''}" onclick="toggleDrink(${day})">
      <span class="drink-toggle-label">🍷 Alcohol today?</span>
      <span class="drink-badge">${hadDrink?'YES':'NO'}</span>
    </div>
  </div>`;

  document.getElementById('todayContent').innerHTML = html;
}

function toggleWorkout(day, i) {
  state.completed[`${day}-${i}`] = !state.completed[`${day}-${i}`];
  saveState(); renderToday();
  if(state.completed[`${day}-${i}`]) showToast('✓ Done!');
}
function markDayComplete(day) {
  const w = SCHEDULE[day]; if(!w) return;
  const all = w.every((_,i) => isWorkoutDone(day,i));
  w.forEach((_,i) => { state.completed[`${day}-${i}`] = !all; });
  saveState(); renderToday();
  if(!all) showToast('🔥 Day complete!');
}
function saveNote(day,text) { state.dayNotes[day]=text; saveState(); }
function toggleDrink(day) {
  state.drinkDays[day] = !state.drinkDays[day];
  saveState(); renderToday(); renderProgress();
}
function changeDay(d) { state.viewingDay=Math.max(1,Math.min(90,state.viewingDay+d)); saveState(); renderToday(); }

function renderSchedWeek(wk, days, today) {
  let html=`<div class="week-section"><div class="week-label-s">Week ${wk} · ${WK_STARTS[wk-1]||''} – ${WK_ENDS[wk-1]||''}</div>`;
  days.forEach(d => {
    const ws=SCHEDULE[d], isRest=ws===null, isToday=d===today, isDone=isDayFullyDone(d);
    const rowFastType = getFastType(d);
    let cls='sched-day-row';
    if(isToday) cls+=' today';
    if(isDone) cls+=' completed-row';
    if(isRest) cls+=' rest-row';
    if(rowFastType==='extended') cls+=' fast-extended';
    if(rowFastType==='deep') cls+=' fast-deep';

    let icon = isDone?'✅':isToday?'▶':isRest?'—':d<today?'○':'';

    // Workout type chips
    let workoutChips = isRest
      ? `<span class="type-chip chip-rest">REST</span>`
      : [...new Set(ws.map(w=>w.type))].map(t=>`<span class="type-chip chip-${t}">${T[t].label}</span>`).join('');

    // Fast type chip — always shown, prominent for extended/deep
    const fastChipClass = rowFastType==='extended'?'chip-fast24':rowFastType==='deep'?'chip-fast20':'chip-fast17';
    const fastChipLabel = rowFastType==='extended'?'💜 24HR FAST':rowFastType==='deep'?'🟡 20HR FAST':'⏱ 17:7';
    const fastChip = `<span class="type-chip ${fastChipClass}">${fastChipLabel}</span>`;

    html+=`<div class="${cls}" onclick="jumpToDay(${d})">
      <div class="sched-day-num">${d}</div>
      <div class="sched-day-info">
        <div class="sched-day-name">${DAY_DATES[d-1]||''}</div>
        <div class="sched-day-types">${workoutChips}${fastChip}</div>
      </div>
      <div class="sched-day-status">${icon}</div>
    </div>`;

    // Measurement row every Sunday (d divisible by 7 = rest day = end of week)
    if(d % 7 === 0) {
      const hasMeasure = state.measurements.some(m=>m.week===wk);
      const measureDates = ['Apr 5','Apr 12','Apr 19','Apr 26','May 3','May 10','May 17','May 24','May 31','Jun 7','Jun 14','Jun 21','Jun 27'];
      html+=`<div class="measure-day-row" onclick="switchTab('progress')">
        <div class="measure-day-icon">📏</div>
        <div class="measure-day-text">
          <div class="measure-day-title">Week ${wk} Measurements</div>
          <div class="measure-day-sub">${measureDates[wk-1]||''} · Sun evening · Weight · BF% · Muscle · Water</div>
        </div>
        <div class="measure-day-done">${hasMeasure?'✅':'📲'}</div>
      </div>`;
    }
  });
  return html+`</div>`;
}

function jumpToDay(d) { state.viewingDay=d; saveState(); switchTab('today'); }

// ══════════════════════════════════════════════
// RENDER PROGRESS
// ══════════════════════════════════════════════
function renderProgress() {
  const today = getTodayDay();
  const done = getCompletedCount();
  const training = Object.values(SCHEDULE).filter(v=>v!==null).length;
  const pct = Math.round((done/training)*100);
  const streak = calcStreak(today);
  const circ = 2*Math.PI*46;
  const offset = circ-(pct/100)*circ;
  const currentWk = Math.ceil(Math.min(today,90)/7);
  const drinkCount = Object.values(state.drinkDays).filter(Boolean).length;
  let afStreak = 0; for(let d=today; d>=1; d--) { if(state.drinkDays[d]) break; afStreak++; }

  // Body fat progress
  const latestBF = state.measurements.length ? parseFloat(state.measurements[state.measurements.length-1].bodyFat)||12.5 : 12.5;
  const bfPct = Math.max(0,Math.min(100,((latestBF-10)/(15-10))*100));

  let html = `
  <div class="prog-hero">
    <div class="prog-top">
      <div class="prog-ring-wrap">
        <svg class="prog-ring-svg" width="100" height="100" viewBox="0 0 100 100">
          <circle class="prog-ring-bg" cx="50" cy="50" r="46"/>
          <circle class="prog-ring-fill" cx="50" cy="50" r="46" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="prog-ring-text"><div class="prog-pct">${pct}%</div><div class="prog-pct-label">Done</div></div>
      </div>
      <div class="prog-right">
        <div class="prog-hero-title">90-Day Progress</div>
        <div class="prog-stats-row">
          <div class="prog-stat"><div class="prog-stat-val" style="color:var(--green)">${done}</div><div class="prog-stat-lbl">Done</div></div>
          <div class="prog-stat"><div class="prog-stat-val" style="color:var(--gold)">${streak}🔥</div><div class="prog-stat-lbl">Streak</div></div>
          <div class="prog-stat"><div class="prog-stat-val" style="color:var(--purple)">${training-done}</div><div class="prog-stat-lbl">Left</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <div class="prog-stat"><div class="prog-stat-val" style="color:${drinkCount?'var(--red)':'var(--muted)'}">${drinkCount}</div><div class="prog-stat-lbl">Drink Days</div></div>
          <div class="prog-stat"><div class="prog-stat-val" style="color:var(--teal)">${afStreak}</div><div class="prog-stat-lbl">Sober Streak</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BODY COMP -->
  <div class="bodycomp-card">
    <div class="bodycomp-title">
      <span>Body Fat Progress</span>
      <span style="color:var(--white);font-size:13px">${latestBF}% → <span style="color:var(--green)">10% goal</span></span>
    </div>
    <div class="bf-progress">
      <div class="bf-bar-row">
        <div class="bf-bar-wrap"><div class="bf-bar-fill ${latestBF>10?'above':''}" style="width:${100-bfPct}%"></div></div>
        <div class="bf-label" style="color:${latestBF<=10?'var(--green)':'var(--orange)'}">${latestBF}%</div>
      </div>
      <div class="bf-target-line">Target: <span class="bf-target-val">10%</span> · Gap: <span style="color:var(--orange)">${Math.max(0,latestBF-10).toFixed(1)}%</span> · Est. ~${Math.round(Math.max(0,latestBF-10)*0.5*2.2)} lbs fat to lose</div>
    </div>
  </div>

  <!-- FASTING PROTOCOL -->
  <div class="fast-protocol-card">
    <div class="fast-protocol-title">⏱ Fasting Protocol — 3 Tiers</div>
    <div class="fast-tier-legend">

      <div class="fast-tier-row tier-daily">
        <div class="fast-tier-badge daily">17:7 · Daily</div>
        <div class="fast-tier-info">
          <div class="fast-tier-title" style="color:var(--teal)">Standard Fast — Every Day</div>
          <div class="fast-tier-desc">Eat 10am–5pm · Fast 5pm→10am = 17hrs · Train at 7:30am (~14.5hrs in) · Break fast with 40g+ protein at 10am</div>
        </div>
      </div>

      <div class="fast-tier-row tier-weekly">
        <div class="fast-tier-badge weekly">24hr · Sunday</div>
        <div class="fast-tier-info">
          <div class="fast-tier-title" style="color:var(--purple)">Extended Fast — Every Sunday</div>
          <div class="fast-tier-desc">Last meal Sat 5pm → break fast Sun 5pm · Full rest day · Deepens ketosis, peaks fat oxidation · Water + electrolytes + black coffee only</div>
        </div>
      </div>

      <div class="fast-tier-row tier-deep">
        <div class="fast-tier-badge deep">20hr · Thu P3</div>
        <div class="fast-tier-info">
          <div class="fast-tier-title" style="color:var(--gold)">Deep Fast — Phase 3 Thursdays</div>
          <div class="fast-tier-desc">Eating compressed to 3–5pm only (2hr window) · Yoga day = active but low-load · Weeks 9–13 only · High protein in that 2hr window (50g+)</div>
        </div>
      </div>

    </div>
    <div class="fast-rules" style="margin-top:12px">
      <div class="fast-rule"><div class="fast-rule-dot"></div>Research basis: 24hr ADF outperforms 16:8 for fat mass reduction (BMJ meta-analysis, 2025)</div>
      <div class="fast-rule"><div class="fast-rule-dot"></div>Sunday 24hr timed on rest day — no glycogen depletion risk for Monday training</div>
      <div class="fast-rule"><div class="fast-rule-dot"></div>P3 Thursday 20hr on yoga day only — low training load protects muscle during compressed window</div>
      <div class="fast-rule"><div class="fast-rule-dot"></div>36hr fasts are NOT used — liver glycogen depletes at 24–36hrs, risking Monday HIIT output</div>
      <div class="fast-rule"><div class="fast-rule-dot"></div>Bed by 8pm every night — sleep is 9+ hrs of free fasted time built into the protocol</div>
    </div>
  </div>

  <!-- HEATMAP -->
  <div class="section-head">90-Day Training Map</div>
  <div class="heatmap-week-labels">${Array.from({length:13},(_,i)=>`<div class="heatmap-wk-lbl">W${i+1}</div>`).join('')}</div>
  <div class="heatmap-grid">`;

  for(let d=1;d<=90;d++) {
    const done2=isDayFullyDone(d), isRest=SCHEDULE[d]===null, isToday=d===today, drank=!!state.drinkDays[d];
    html+=`<div class="heatmap-cell${done2?' done':''}${isRest?' rest-cell':''}${isToday?' today':''}${drank?' drank':''}" title="Day ${d}${drank?' · 🍷':''}"></div>`;
  }
  html+=`</div>`;

  // Measurements — week selector (logic provided by GEN:SHARED_JS)
  const defaultFormWeek = calcDefaultFormWeek(currentWk);
  const wkOptions = buildWeekOptions(currentWk, defaultFormWeek);

  html += `
  <div class="section-head">Weekly Measurements</div>
  <div class="measure-form">
    <div class="measure-form-title">
      <span>Log Measurements</span>
      <select id="measure-wk-sel" class="measure-week-select" onchange="onMeasureWkChange(parseInt(this.value))">${wkOptions}</select>
    </div>
    <div class="measure-grid">
      <div class="measure-field"><label>Weight <span class="measure-unit">lbs</span></label><input type="number" id="m-weight" placeholder="185" inputmode="decimal" step="0.1"></div>
      <div class="measure-field"><label>Body Fat <span class="measure-unit">%</span></label><input type="number" id="m-fat" placeholder="12.5" inputmode="decimal" step="0.1"></div>
      <div class="measure-field"><label>Muscle Mass <span class="measure-unit">lbs</span></label><input type="number" id="m-muscle" placeholder="148" inputmode="decimal" step="0.1"></div>
      <div class="measure-field"><label>Body Water <span class="measure-unit">%</span></label><input type="number" id="m-water" placeholder="55" inputmode="decimal" step="0.1"></div>
    </div>
    <button class="measure-save-btn" onclick="saveMeasurementFromForm()">SAVE MEASUREMENTS</button>
  </div>`;

  if(state.measurements.length) {
    html+=`<div class="section-head">Measurement History</div><div class="history-table">
    <div class="history-row header-row"><div>Wk</div><div>Weight</div><div>BF%</div><div>Muscle</div><div>Water%</div></div>`;
    state.measurements.forEach((m,i) => {
      const p=state.measurements[i-1];
      function d(curr,prev,f,lower=true) {
        if(!prev||!curr[f]||!prev[f]) return '';
        const diff=(parseFloat(curr[f])-parseFloat(prev[f])).toFixed(1);
        if(diff==0) return `<span class="history-delta delta-same">—</span>`;
        const good=lower?diff<0:diff>0;
        return `<span class="history-delta ${good?'delta-down':'delta-up'}">${diff>0?'+':''}${diff}</span>`;
      }
      html+=`<div class="history-row">
        <div class="history-wk">${m.week===0?'BASE':'W'+m.week}</div>
        <div class="history-val">${m.weight||'—'} ${d(m,p,'weight',true)}</div>
        <div class="history-val">${m.bodyFat?m.bodyFat+'%':'—'} ${d(m,p,'bodyFat',true)}</div>
        <div class="history-val">${m.muscle||'—'} ${d(m,p,'muscle',false)}</div>
        <div class="history-val">${m.water?m.water+'%':'—'} ${d(m,p,'water',false)}</div>
      </div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="history-table"><div class="empty-history">No measurements yet — log your Week 0 baseline tonight before Day 1!</div></div>`;
  }

  document.getElementById('progressContent').innerHTML = html;
  onMeasureWkChange(defaultFormWeek);
}

function calcStreak(today) {
  let s=0;
  for(let d=Math.min(today,90);d>=1;d--) {
    if(SCHEDULE[d]===null) continue;
    if(isDayFullyDone(d)) s++;
    else if(d<today) break;
  }
  return s;
}

function saveMeasurement(forceWeek) {
  const weight=document.getElementById('m-weight').value;
  const bodyFat=document.getElementById('m-fat').value;
  const muscle=document.getElementById('m-muscle').value;
  const water=document.getElementById('m-water').value;
  if(!weight&&!bodyFat&&!muscle&&!water){showToast('Enter a measurement','var(--red)');return;}
  const wk = (forceWeek !== undefined) ? forceWeek : Math.ceil(Math.min(getTodayDay(),90)/7);
  const label = wk===0 ? 'Baseline (Mar 29)' : new Date().toLocaleDateString();
  const entry={week:wk,date:label,weight,bodyFat,muscle,water};
  const idx=state.measurements.findIndex(m=>m.week===wk);
  if(idx>=0) state.measurements[idx]=entry; else {state.measurements.push(entry);state.measurements.sort((a,b)=>a.week-b.week);}
  saveState(); renderProgress();
  showToast(wk===0?'📏 Baseline saved!':'📊 Week '+wk+' saved!');
}

// ══════════════════════════════════════════════
// TABS & UTILS
// ══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.querySelector('.scroll-view').scrollTop=0;
  if(tab==='today') { state.viewingDay=getTodayDay(); saveState(); renderToday(); }
  else if(tab==='schedule') renderSchedule();
  else renderProgress();
}

let toastT;
// ── CLASS DETAIL MODAL ──────────────────────────────────────────────────────
const TYPE_LABELS_MODAL = {
  hiit:'HIIT Cycling', ride:'Cycling', bootcamp:'Bike Bootcamp',
  strength:'Strength', core:'Core', yoga:'Yoga', stretch:'Stretch', pullups:'Pull-Ups'
};
const TYPE_EMOJI = {
  hiit:'🚴', ride:'🚴', bootcamp:'💥', strength:'🏋️', core:'💪', yoga:'🧘', stretch:'🤸', pullups:'⬆️'
};

function openClassModal(day, idx) {
  const wk = SCHEDULE[day][idx];
  const overlay = document.getElementById('classModalOverlay');
  const discipline = TYPE_DISCIPLINE[wk.type] || 'cycling';

  // Thumbnail — try image URL first, fall back to emoji placeholder
  const thumbEl = document.getElementById('classModalThumb');
  if(wk.imageUrl) {
    thumbEl.innerHTML = `<img class="class-modal-thumb" src="${wk.imageUrl}" alt="${wk.name}" onerror="this.parentElement.innerHTML='<div class=\'class-modal-thumb-placeholder\'>${TYPE_EMOJI[wk.type]||'🏋️'}</div>'">`;
  } else {
    thumbEl.innerHTML = `<div class="class-modal-thumb-placeholder">${TYPE_EMOJI[wk.type]||'🏋️'}</div>`;
  }

  document.getElementById('classModalType').textContent = TYPE_LABELS_MODAL[wk.type] || wk.type;
  document.getElementById('classModalName').textContent = wk.name;
  document.getElementById('classModalInstructor').textContent = `with ${wk.instructor}`;

  // Stats
  let stats = `<div class="class-modal-stat"><div class="class-modal-stat-val">${wk.mins} min</div><div class="class-modal-stat-lbl">Duration</div></div>`;
  if(wk.difficultyRating != null) stats += `<div class="class-modal-stat"><div class="class-modal-stat-val">${wk.difficultyRating.toFixed(1)}</div><div class="class-modal-stat-lbl">Difficulty</div></div>`;
  if(wk.overallRating != null)    stats += `<div class="class-modal-stat"><div class="class-modal-stat-val">${Math.round(wk.overallRating*100)}%</div><div class="class-modal-stat-lbl">Rating</div></div>`;
  document.getElementById('classModalStats').innerHTML = stats;

  // CTA button
  const btn = document.getElementById('classModalBtn');
  if(wk.classId) {
    btn.href = `https://members.onepeloton.com/classes/${discipline}?modal=classDetailsModal&classId=${wk.classId}`;
    btn.style.display = 'block';
  } else {
    btn.style.display = 'none';
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeClassModal() {
  document.getElementById('classModalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function showToast(msg,bg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=bg||'var(--green)';
  el.classList.add('show'); clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2000);
}

// ══ INIT ══
loadState();
renderToday();

// Update fasting status every minute
setInterval(()=>{
  const f=getFastingStatus();
  const el=document.getElementById('fastStatus');

    const todayFT = getFastType(getTodayDay());

// PWA SETUP — Icons, Service Worker, iOS Banner
// manifest.json and sw.js are now separate files

(function initPWA() {
  // ── Generate apple-touch-icon via canvas (iOS home screen icon) ──
  // To change the icon design, edit generate-icons.html and re-download icon-192.png / icon-512.png
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#080810';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#e8322a';
    ctx.fillRect(0, 0, size, size * 0.07);
    ctx.fillStyle = '#e8322a';
    ctx.font = `900 ${size * 0.42}px 'Arial Black', Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('90', size / 2, size * 0.42);
    ctx.fillStyle = 'rgba(240,238,232,0.7)';
    ctx.font = `700 ${size * 0.13}px Arial`;
    ctx.fillText('PELOTON', size / 2, size * 0.72);
    ctx.fillStyle = '#1eb89a';
    ctx.beginPath();
    ctx.arc(size / 2, size * 0.87, size * 0.04, 0, Math.PI * 2);
    ctx.fill();
    return c.toDataURL('image/png');
  }
  document.getElementById('appleTouchIcon').href = makeIcon(192);

  // ── Register Service Worker from sw.js ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(() => console.log('P90 SW registered'))
      .catch(e => console.log('SW note:', e.message));
  }

  // ── iOS Install Banner ──
  // Show a native-feeling install prompt on iOS if not already installed
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  const dismissed = localStorage.getItem('p90_install_dismissed');

  if (isIOS && !isStandalone && !dismissed) {
    setTimeout(() => {
      const banner = document.createElement('div');
      banner.id = 'installBanner';
      banner.innerHTML = `
        <style>
          #installBanner {
            position:fixed; bottom:0; left:0; right:0; z-index:9999;
            background:#1a1a2e; border-top:2px solid #e8322a;
            padding:14px 16px calc(env(safe-area-inset-bottom,20px) + 14px);
            display:flex; align-items:center; gap:12px;
            animation: slideUp 0.3s ease;
          }
          @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
          #installBanner .ib-icon { font-size:32px; flex-shrink:0; }
          #installBanner .ib-text { flex:1; }
          #installBanner .ib-title { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#f0eee8; margin-bottom:3px; }
          #installBanner .ib-steps { font-size:11px; color:rgba(240,238,232,.6); line-height:1.5; }
          #installBanner .ib-steps span { color:#1eb89a; font-weight:600; }
          #installBanner .ib-close { font-size:20px; color:rgba(240,238,232,.4); cursor:pointer; padding:4px; flex-shrink:0; }
        </style>
        <div class="ib-icon">📱</div>
        <div class="ib-text">
          <div class="ib-title">Add to Home Screen</div>
          <div class="ib-steps">Tap <span>Share ↑</span> then <span>"Add to Home Screen"</span> for the full app experience — works offline too</div>
        </div>
        <div class="ib-close" onclick="document.getElementById('installBanner').remove();localStorage.setItem('p90_install_dismissed','1')">✕</div>
      `;
      document.body.appendChild(banner);
    }, 2500);
  }
})();
